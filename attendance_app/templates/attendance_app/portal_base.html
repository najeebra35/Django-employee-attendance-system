<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}My Attendance{% endblock %} — AttendPro Portal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --orange:#f97316; --orange-dark:#ea580c; --orange-pale:#fff7ed; --orange-light:#fed7aa;
  --slate-50:#f8fafc; --slate-100:#f1f5f9; --slate-200:#e2e8f0; --slate-300:#cbd5e1;
  --slate-400:#94a3b8; --slate-500:#64748b; --slate-600:#475569; --slate-700:#334155;
  --slate-800:#1e293b; --slate-900:#0f172a;
  --white:#fff; --green:#22c55e; --red:#ef4444; --blue:#3b82f6; --yellow:#f59e0b; --purple:#a855f7;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -1px rgba(0,0,0,.05);
  --radius:12px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--slate-50); color:var(--slate-800); min-height:100vh; }

/* ── TOP NAV ───────────────────────────────────── */
.portal-nav {
  background:white; border-bottom:1px solid var(--slate-200);
  padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100; box-shadow:var(--shadow);
}
.portal-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
.portal-brand-icon { width:34px;height:34px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:16px;color:white; }
.portal-brand-name { font-size:16px; font-weight:800; color:var(--slate-900); }
.portal-brand-sub  { font-size:10px; color:var(--slate-400); font-weight:500; }

.portal-nav-links { display:flex; align-items:center; gap:4px; }
.portal-nav-link {
  display:flex; align-items:center; gap:7px; padding:7px 14px; border-radius:9px;
  font-size:13px; font-weight:600; color:var(--slate-600); text-decoration:none; transition:all .15s;
}
.portal-nav-link:hover { background:var(--orange-pale); color:var(--orange); }
.portal-nav-link.active { background:var(--orange-pale); color:var(--orange-dark); }

.portal-nav-right { display:flex; align-items:center; gap:12px; }
.portal-user-chip {
  display:flex; align-items:center; gap:8px; padding:5px 12px 5px 6px;
  border-radius:20px; background:var(--slate-100); font-size:12px; font-weight:600; color:var(--slate-700);
}
.portal-user-avatar {
  width:26px; height:26px; border-radius:50%; background:var(--orange);
  display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:white;
}
.portal-logout {
  display:flex; align-items:center; gap:5px; padding:6px 12px; border-radius:8px;
  background:none; border:1.5px solid var(--slate-200); font-size:12px; font-weight:600;
  color:var(--slate-500); cursor:pointer; text-decoration:none; transition:all .15s;
}
.portal-logout:hover { border-color:#dc2626; color:#dc2626; background:#fff5f5; }

/* ── MAIN ──────────────────────────────────────── */
.portal-main { max-width:960px; margin:0 auto; padding:28px 20px 48px; }

/* ── CARDS ─────────────────────────────────────── */
.card { background:white; border-radius:var(--radius); border:1px solid var(--slate-200); box-shadow:var(--shadow); }
.card-body { padding:20px 24px; }

.stat-card {
  background:white; border-radius:14px; padding:18px 20px;
  box-shadow:var(--shadow); border:1px solid var(--slate-200);
  display:flex; align-items:center; gap:14px;
}
.stat-icon {
  width:46px; height:46px; border-radius:12px; display:flex;
  align-items:center; justify-content:center; font-size:18px; flex-shrink:0;
}
.stat-val { font-size:26px; font-weight:800; color:var(--slate-900); line-height:1; }
.stat-label { font-size:12px; color:var(--slate-500); font-weight:600; margin-top:3px; }

/* ── BADGES ─────────────────────────────────────── */
.badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-green  { background:#dcfce7; color:#16a34a; }
.badge-red    { background:#fee2e2; color:#dc2626; }
.badge-orange { background:var(--orange-pale); color:var(--orange-dark); }
.badge-blue   { background:#dbeafe; color:#1d4ed8; }
.badge-purple { background:#f3e8ff; color:#7e22ce; }
.badge-gray   { background:var(--slate-100); color:var(--slate-600); }
.badge-yellow { background:#fef3c7; color:#d97706; }

/* ── ALERT ──────────────────────────────────────── */
.alert { padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:13px; font-weight:500; display:flex; align-items:center; gap:10px; }
.alert-success { background:#dcfce7; color:#15803d; border-left:3px solid var(--green); }
.alert-error   { background:#fee2e2; color:#dc2626; border-left:3px solid var(--red); }
.alert-info    { background:#dbeafe; color:#1d4ed8; border-left:3px solid var(--blue); }

/* ── TABLE ──────────────────────────────────────── */
.table-wrap { overflow-x:auto; border-radius:var(--radius); }
table.dt { width:100%; border-collapse:collapse; font-size:13px; }
table.dt thead tr { background:var(--slate-50); border-bottom:2px solid var(--slate-200); }
table.dt thead th { padding:10px 14px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--slate-500); }
table.dt tbody tr { border-bottom:1px solid var(--slate-100); transition:background .15s; }
table.dt tbody tr:hover { background:var(--orange-pale); }
table.dt tbody td { padding:11px 14px; color:var(--slate-700); }

/* ── FORM ────────────────────────────────────────── */
.form-control { width:100%; padding:8px 12px; border:1.5px solid var(--slate-200); border-radius:8px; font-size:13px; font-family:inherit; color:var(--slate-800); background:white; outline:none; transition:border-color .2s,box-shadow .2s; }
.form-control:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(249,115,22,.12); }
select.form-control { cursor:pointer; }

/* ── MODAL ───────────────────────────────────────── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal-box { background:white; border-radius:16px; padding:28px; max-width:420px; width:92%; box-shadow:0 20px 60px rgba(0,0,0,.18); }
.modal-title { font-size:16px; font-weight:800; color:var(--slate-900); margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
.modal-close { background:none; border:none; font-size:18px; cursor:pointer; color:var(--slate-400); padding:2px 6px; border-radius:6px; }
.modal-close:hover { background:var(--slate-100); color:var(--slate-700); }

/* ── MISC ────────────────────────────────────────── */
.page-title { font-size:22px; font-weight:800; color:var(--slate-900); }
.page-sub   { font-size:13px; color:var(--slate-500); margin-top:3px; }
.text-muted { color:var(--slate-500); font-size:12px; }
.divider    { border:none; border-top:1px solid var(--slate-100); margin:16px 0; }
.empty-state { text-align:center; padding:40px 20px; color:var(--slate-400); }
.empty-state i { font-size:40px; margin-bottom:12px; opacity:.4; display:block; }

@media (max-width:640px) {
  .portal-nav-links { display:none; }
  .portal-main { padding:16px 12px; }
}
</style>
<style>
@media(max-width:768px){
  .portal-topbar{padding:0 14px;}
  .portal-content{padding:14px;}
  .portal-page-header{flex-direction:column;align-items:flex-start;gap:10px;}
  .portal-nav-links{overflow-x:auto;gap:4px;padding-bottom:2px;}
  .portal-nav-link{padding:8px 12px;font-size:12px;white-space:nowrap;}
}
@media(max-width:480px){
  .portal-content{padding:10px;}
}</style>
{% block extra_css %}{% endblock %}
</head>
<body>

<nav class="portal-nav">
  <div style="display:flex;align-items:center;gap:20px">
    <a href="{% url 'portal_dashboard' %}" class="portal-brand">
      <div class="portal-brand-icon">🏢</div>
      <div>
        <div class="portal-brand-name">AttendPro</div>
        <div class="portal-brand-sub">Employee Portal</div>
      </div>
    </a>
    <div class="portal-nav-links">
      <a href="{% url 'portal_dashboard' %}" class="portal-nav-link {% if request.resolver_match.url_name == 'portal_dashboard' %}active{% endif %}">
        <i class="fas fa-gauge-high"></i> Dashboard
      </a>
      <a href="{% url 'portal_attendance' %}" class="portal-nav-link {% if request.resolver_match.url_name == 'portal_attendance' %}active{% endif %}">
        <i class="fas fa-calendar-check"></i> My Attendance
      </a>
    </div>
  </div>
  <div class="portal-nav-right">
    <div class="portal-user-chip">
      <div class="portal-user-avatar">{{ request.user.username|first|upper }}</div>
      {{ emp.name }}
    </div>
    <a href="{% url 'logout' %}" class="portal-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </div>
</nav>

<div class="portal-main">
  {% for message in messages %}
  <div class="alert alert-{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% else %}info{% endif %}">
    <i class="fas fa-circle-info"></i> {{ message }}
  </div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>

{% block extra_js %}{% endblock %}
</body>
</html>
